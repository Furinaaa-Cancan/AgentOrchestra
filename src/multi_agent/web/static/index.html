<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyGO Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eef2ff', 100:'#e0e7ff', 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca', 900:'#312e81' },
            surface: { 800:'#1e1b2e', 900:'#0f0d1a' },
          }
        }
      }
    }
  </script>
  <style>
    body { background: #0f0d1a; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .glass { background: rgba(30,27,46,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(99,102,241,0.15); }
    .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    pre { white-space: pre-wrap; word-break: break-word; }
    .task-card:hover { border-color: rgba(99,102,241,0.4); transform: translateY(-1px); }
    .task-card { transition: all 0.2s ease; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 3px; }
  </style>
</head>
<body class="text-gray-200 min-h-screen">

  <!-- Header -->
  <header class="glass sticky top-0 z-50 px-6 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="text-2xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
        MyGO!!!!!
      </div>
      <span class="text-xs text-gray-500 mt-1">Dashboard v0.8.0</span>
    </div>
    <div class="flex items-center gap-4">
      <div id="connection-status" class="flex items-center gap-2 text-xs">
        <span class="w-2 h-2 rounded-full bg-gray-500" id="status-dot"></span>
        <span id="status-text">Connecting...</span>
      </div>
      <button onclick="refreshAll()" class="px-3 py-1.5 text-xs rounded-lg bg-indigo-600/20 text-indigo-300 hover:bg-indigo-600/40 transition">
        Refresh
      </button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">

    <!-- Status Cards Row -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4" id="status-cards">
      <div class="glass rounded-xl p-5">
        <div class="text-xs text-gray-500 uppercase tracking-wider mb-1">Active Task</div>
        <div class="text-lg font-semibold text-white" id="active-task">—</div>
      </div>
      <div class="glass rounded-xl p-5">
        <div class="text-xs text-gray-500 uppercase tracking-wider mb-1">Project Root</div>
        <div class="text-sm text-gray-300 font-mono truncate" id="project-root">—</div>
      </div>
      <div class="glass rounded-xl p-5">
        <div class="text-xs text-gray-500 uppercase tracking-wider mb-1">Total Tasks</div>
        <div class="text-lg font-semibold text-white" id="total-tasks">0</div>
      </div>
    </div>

    <!-- Main Grid: Dashboard + Timeline -->
    <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">

      <!-- Dashboard MD (left 3 cols) -->
      <div class="lg:col-span-3 glass rounded-xl p-6">
        <h2 class="text-sm font-semibold text-indigo-300 uppercase tracking-wider mb-4">Live Dashboard</h2>
        <div id="dashboard-content" class="prose prose-invert prose-sm max-w-none text-gray-300">
          <p class="text-gray-500 italic">No active task. Start one with: my go "requirement"</p>
        </div>
      </div>

      <!-- Event Timeline (right 2 cols) -->
      <div class="lg:col-span-2 glass rounded-xl p-6 max-h-[600px] overflow-y-auto">
        <h2 class="text-sm font-semibold text-indigo-300 uppercase tracking-wider mb-4">Event Stream</h2>
        <div id="event-timeline" class="space-y-3">
          <p class="text-gray-500 italic text-sm">Waiting for events...</p>
        </div>
      </div>
    </div>

    <!-- Task List -->
    <div class="glass rounded-xl p-6">
      <h2 class="text-sm font-semibold text-indigo-300 uppercase tracking-wider mb-4">Task History</h2>
      <div id="task-list" class="space-y-3">
        <p class="text-gray-500 italic text-sm">Loading...</p>
      </div>
    </div>

    <!-- Task Detail Modal -->
    <div id="task-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/60 backdrop-blur-sm">
      <div class="glass rounded-2xl p-6 max-w-3xl w-full mx-4 max-h-[80vh] overflow-y-auto fade-in">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-lg font-semibold text-white" id="modal-title">Task Detail</h3>
          <button onclick="closeModal()" class="text-gray-400 hover:text-white text-xl">&times;</button>
        </div>
        <div id="modal-content" class="space-y-4"></div>
      </div>
    </div>

  </main>

  <script>
    // ── State ───────────────────────────
    let eventSource = null;
    let allEvents = [];

    // ── Init ────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      refreshAll();
      connectSSE();
    });

    async function refreshAll() {
      await Promise.all([fetchStatus(), fetchTasks()]);
    }

    // ── REST Fetchers ───────────────────

    async function fetchStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        document.getElementById('active-task').textContent = data.active_task || '— idle —';
        document.getElementById('project-root').textContent = data.root_dir || '—';
        if (data.active_task) {
          document.getElementById('active-task').classList.add('text-green-400');
        } else {
          document.getElementById('active-task').classList.remove('text-green-400');
        }
        if (data.dashboard_md) {
          renderMarkdown(data.dashboard_md);
        }
      } catch (e) {
        console.error('Status fetch failed:', e);
      }
    }

    async function fetchTasks() {
      try {
        const res = await fetch('/api/tasks');
        const data = await res.json();
        document.getElementById('total-tasks').textContent = data.count;
        renderTaskList(data.tasks);
      } catch (e) {
        console.error('Tasks fetch failed:', e);
      }
    }

    async function fetchTaskDetail(taskId) {
      try {
        const res = await fetch(`/api/tasks/${taskId}`);
        const data = await res.json();
        showModal(taskId, data);
      } catch (e) {
        console.error('Task detail fetch failed:', e);
      }
    }

    // ── SSE Connection ──────────────────

    function connectSSE() {
      if (eventSource) eventSource.close();
      eventSource = new EventSource('/api/events');

      eventSource.addEventListener('connected', (e) => {
        setConnectionStatus('connected');
      });

      eventSource.addEventListener('heartbeat', (e) => {
        setConnectionStatus('connected');
      });

      eventSource.addEventListener('dashboard_update', (e) => {
        const data = JSON.parse(e.data);
        if (data.content) renderMarkdown(data.content);
      });

      eventSource.addEventListener('trace_update', (e) => {
        const data = JSON.parse(e.data);
        if (data.new_events) {
          data.new_events.forEach(evt => addTimelineEvent(evt));
        }
      });

      eventSource.onerror = () => {
        setConnectionStatus('disconnected');
        setTimeout(connectSSE, 5000);
      };
    }

    function setConnectionStatus(status) {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      if (status === 'connected') {
        dot.className = 'w-2 h-2 rounded-full bg-green-400 pulse-dot';
        text.textContent = 'Connected';
        text.className = 'text-green-400';
      } else {
        dot.className = 'w-2 h-2 rounded-full bg-red-400';
        text.textContent = 'Disconnected';
        text.className = 'text-red-400';
      }
    }

    // ── Renderers ───────────────────────

    function renderMarkdown(md) {
      const container = document.getElementById('dashboard-content');
      // Simple markdown → HTML (headings, bold, lists, code blocks)
      let html = md
        .replace(/^### (.+)$/gm, '<h3 class="text-indigo-300 font-semibold mt-3 mb-1">$1</h3>')
        .replace(/^## (.+)$/gm, '<h2 class="text-indigo-200 font-bold text-lg mt-4 mb-2">$1</h2>')
        .replace(/^# (.+)$/gm, '<h1 class="text-white font-bold text-xl mt-4 mb-2">$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<strong class="text-white">$1</strong>')
        .replace(/^- (.+)$/gm, '<li class="ml-4 list-disc">$1</li>')
        .replace(/^(\d+)\. (.+)$/gm, '<li class="ml-4 list-decimal">$2</li>')
        .replace(/```([\s\S]*?)```/g, '<pre class="bg-black/40 rounded-lg p-3 text-xs font-mono text-gray-300 my-2 overflow-x-auto">$1</pre>')
        .replace(/`(.+?)`/g, '<code class="bg-black/30 px-1.5 py-0.5 rounded text-indigo-300 text-xs">$1</code>')
        .replace(/\n\n/g, '<br><br>')
        .replace(/\n/g, '<br>');
      container.innerHTML = html;
    }

    function renderTaskList(tasks) {
      const container = document.getElementById('task-list');
      if (!tasks.length) {
        container.innerHTML = '<p class="text-gray-500 italic text-sm">No tasks found</p>';
        return;
      }
      container.innerHTML = tasks.slice(0, 30).map(t => {
        const statusColor = getStatusColor(t.status);
        const timeAgo = formatTimeAgo(t.modified);
        const req = (t.requirement || '').substring(0, 120);
        return `
          <div class="task-card glass rounded-lg p-4 cursor-pointer" onclick="fetchTaskDetail('${t.task_id}')">
            <div class="flex items-center justify-between mb-1">
              <span class="font-mono text-xs text-gray-400">${t.task_id}</span>
              <div class="flex items-center gap-2">
                <span class="px-2 py-0.5 rounded-full text-xs font-medium ${statusColor}">${t.status || '?'}</span>
                <span class="text-xs text-gray-500">${timeAgo}</span>
              </div>
            </div>
            <div class="text-sm text-gray-300 truncate">${escapeHtml(req)}</div>
            ${t.current_agent ? `<div class="text-xs text-gray-500 mt-1">Agent: ${t.current_agent}</div>` : ''}
          </div>`;
      }).join('');
    }

    function addTimelineEvent(evt) {
      allEvents.unshift(evt);
      if (allEvents.length > 100) allEvents.pop();
      const container = document.getElementById('event-timeline');
      // Remove placeholder
      if (container.querySelector('.italic')) container.innerHTML = '';

      const typeColors = {
        session_start: 'text-green-400 bg-green-400/10',
        session_pull: 'text-blue-400 bg-blue-400/10',
        session_push: 'text-purple-400 bg-purple-400/10',
        node_enter: 'text-yellow-400 bg-yellow-400/10',
        node_exit: 'text-orange-400 bg-orange-400/10',
      };
      const evtType = evt.event_type || evt.type || 'unknown';
      const colorClass = typeColors[evtType] || 'text-gray-400 bg-gray-400/10';
      const ts = evt.timestamp ? new Date(evt.timestamp * 1000).toLocaleTimeString() : '';
      const actor = evt.actor || evt.agent || '';
      const detail = evt.details ? (typeof evt.details === 'string' ? evt.details : JSON.stringify(evt.details).substring(0, 200)) : '';

      const el = document.createElement('div');
      el.className = 'fade-in border-l-2 border-indigo-600/30 pl-3 py-1';
      el.innerHTML = `
        <div class="flex items-center gap-2 mb-0.5">
          <span class="px-1.5 py-0.5 rounded text-xs font-mono ${colorClass}">${evtType}</span>
          ${actor ? `<span class="text-xs text-gray-500">${actor}</span>` : ''}
          <span class="text-xs text-gray-600 ml-auto">${ts}</span>
        </div>
        ${detail ? `<div class="text-xs text-gray-400 truncate">${escapeHtml(detail)}</div>` : ''}
      `;
      container.prepend(el);

      // Keep max 50 DOM elements
      while (container.children.length > 50) {
        container.removeChild(container.lastChild);
      }

      // Auto-refresh status on important events
      if (['session_start', 'session_push', 'node_exit'].includes(evtType)) {
        fetchStatus();
      }
    }

    // ── Modal ───────────────────────────

    function showModal(taskId, data) {
      document.getElementById('modal-title').textContent = `Task: ${taskId}`;
      const content = document.getElementById('modal-content');

      let html = '';

      // Task data
      if (data.task_data && Object.keys(data.task_data).length) {
        html += `<div>
          <h4 class="text-xs text-indigo-300 uppercase tracking-wider mb-2">Task Config</h4>
          <pre class="bg-black/40 rounded-lg p-3 text-xs font-mono text-gray-300 max-h-60 overflow-y-auto">${escapeHtml(JSON.stringify(data.task_data, null, 2))}</pre>
        </div>`;
      }

      // Trace events
      if (data.trace_events && data.trace_events.length) {
        html += `<div>
          <h4 class="text-xs text-indigo-300 uppercase tracking-wider mb-2">Trace Events (${data.trace_events.length})</h4>
          <div class="space-y-2 max-h-80 overflow-y-auto">
            ${data.trace_events.map(evt => {
              const evtType = evt.event_type || evt.type || '?';
              const ts = evt.timestamp ? new Date(evt.timestamp * 1000).toLocaleTimeString() : '';
              const actor = evt.actor || '';
              return `<div class="border-l-2 border-indigo-600/20 pl-3 py-1 text-xs">
                <span class="text-indigo-400 font-mono">${evtType}</span>
                ${actor ? `<span class="text-gray-500 ml-2">${actor}</span>` : ''}
                <span class="text-gray-600 ml-2">${ts}</span>
                ${evt.details ? `<div class="text-gray-400 mt-0.5 truncate">${escapeHtml(typeof evt.details === 'string' ? evt.details : JSON.stringify(evt.details).substring(0, 300))}</div>` : ''}
              </div>`;
            }).join('')}
          </div>
        </div>`;
      } else {
        html += '<p class="text-gray-500 text-sm italic">No trace events found</p>';
      }

      content.innerHTML = html;
      document.getElementById('task-modal').classList.remove('hidden');
      document.getElementById('task-modal').classList.add('flex');
    }

    function closeModal() {
      document.getElementById('task-modal').classList.add('hidden');
      document.getElementById('task-modal').classList.remove('flex');
    }

    // Close modal on backdrop click
    document.getElementById('task-modal')?.addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });

    // ── Utils ────────────────────────────

    function getStatusColor(status) {
      const map = {
        approved: 'bg-green-500/20 text-green-300',
        completed: 'bg-green-500/20 text-green-300',
        running: 'bg-blue-500/20 text-blue-300',
        active: 'bg-blue-500/20 text-blue-300',
        rejected: 'bg-red-500/20 text-red-300',
        failed: 'bg-red-500/20 text-red-300',
        cancelled: 'bg-gray-500/20 text-gray-300',
        pending: 'bg-yellow-500/20 text-yellow-300',
      };
      return map[(status || '').toLowerCase()] || 'bg-gray-500/20 text-gray-400';
    }

    function formatTimeAgo(ts) {
      if (!ts) return '';
      const diff = (Date.now() / 1000) - ts;
      if (diff < 60) return 'just now';
      if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
      return `${Math.floor(diff/86400)}d ago`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
